<p>sidebar works!</p>
    <!-- Mobile overlay -->
    <div
      *ngIf="mobileOpen()"
      class="fixed inset-0 bg-black/60 z-20 lg:hidden"
      (click)="mobileOpen.set(false)"
    ></div>

    <!-- Sidebar -->
    <aside [class]="sidebarClasses()">

      <!-- Logo -->
      <div class="px-6 py-7 border-b border-[#2a3347]">
        <div class="flex items-center gap-[10px]">
          <div class="w-8 h-8 bg-amber-500 rounded-lg flex items-center justify-center text-base shrink-0">
            🔧
          </div>
          <span class="font-display text-[1.4rem] font-bold tracking-[0.05em] text-[#e2e8f0]">
            Auto<span class="text-amber-500">Track</span>
          </span>
        </div>
      </div>

      <!-- Nav -->
      <nav class="flex-1 flex flex-col gap-0.5 px-3 py-4 overflow-y-auto">
        <ng-container *ngFor="let section of navSections">

          <!-- Section label -->
          <p *ngIf="section.label"
             class="font-mono text-[0.65rem] text-[#64748b] tracking-[0.12em] uppercase px-3 pt-3 pb-1.5">
            {{ section.label }}
          </p>

          <!-- Nav item -->
          <a
            *ngFor="let item of section.items"
            [routerLink]="item.route"
            routerLinkActive="nav-active"
            [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
            (click)="mobileOpen.set(false)"
            class="nav-item relative flex items-center gap-[10px] px-3 py-[10px] rounded-lg
                   text-[0.9rem] font-medium text-[#64748b] no-underline
                   transition-all duration-150 hover:bg-[#1e2535] hover:text-[#e2e8f0]"
          >
            <!-- Active left bar -->
            <span class="active-bar absolute left-0 top-[20%] bottom-[20%] w-[3px]
                         bg-amber-500 rounded-r-[3px] opacity-0 transition-opacity duration-150">
            </span>

            <span class="w-5 text-center text-base shrink-0">{{ item.icon }}</span>
            <span class="flex-1">{{ item.label }}</span>

            <span
              *ngIf="item.badge"
              class="ml-auto font-mono text-[0.7rem] font-bold text-white
                     bg-red-500 px-[7px] py-[2px] rounded-full leading-none"
            >{{ item.badge }}</span>
          </a>

        </ng-container>
      </nav>

      <!-- Footer / User card -->
      <div class="px-4 py-4 border-t border-[#2a3347]">
        <div class="flex items-center gap-[10px]">
          <div class="w-8 h-8 rounded-full bg-gradient-to-br from-amber-500 to-amber-600
                      flex items-center justify-center font-bold text-[0.8rem] text-black shrink-0">
            R
          </div>
          <div class="flex-1 min-w-0">
            <div class="text-[0.85rem] font-semibold text-[#e2e8f0] truncate">Ron</div>
            <div class="text-[0.72rem] text-[#64748b] truncate">Free Plan</div>
          </div>
          <button
            class="p-1.5 rounded-md text-[#64748b] hover:text-[#e2e8f0]
                   hover:bg-[#1e2535] transition-colors"
            title="Settings"
          >
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0
                   002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0
                   001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0
                   00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0
                   00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0
                   00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0
                   00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0
                   001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608
                   2.296.07 2.572-1.065z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
          </button>
        </div>
      </div>

    </aside>

    <!-- Desktop spacer so main content doesn't go behind the sidebar -->
    <div class="hidden lg:block w-[220px] shrink-0"></div>
